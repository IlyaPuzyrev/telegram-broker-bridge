version: '3.8'

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
    command: "-m 8222 -js"  # Enable JetStream and monitoring on port 8222
    volumes:
      - nats-data:/data
  nui:
    image: ghcr.io/nats-nui/nui:latest
    ports:
      - "31311:31311"
    volumes:
      - nui-data:/db

volumes:
  nats-data:
  nui-data:
